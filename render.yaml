# Déploiement Render — https://render.com
# 1. Connecter le repo GitHub ChurchFace
# 2. New > Blueprint > sélectionner render.yaml
# 3. Renseigner les variables secrètes dans le dashboard

services:
  - type: web
    name: churchface
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=460
      - key: DATABASE_URL
        fromDatabase:
          name: churchface-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: UPLOADTHING_SECRET
        sync: false
      - key: UPLOADTHING_APP_ID
        sync: false
      - key: UPLOADTHING_TOKEN
        sync: false

databases:
  - name: churchface-db
    plan: free
    databaseName: churchface
    user: churchface
